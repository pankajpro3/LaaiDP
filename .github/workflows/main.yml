name: ROWDYX RDP BORE AUTO-RECONNECT 😈

on: 
  workflow_dispatch:

jobs:
  rdp-permanent:
    runs-on: windows-latest
    timeout-minutes: 360  # 6 ghanta, bina roye
    steps:
      - name: 🛡️ Disable Sleep aur Firewall + RDP Enable
        shell: pwsh
        run: |
          # Machine kabhi nahi soegi
          powercfg /change standby-timeout-ac 0
          powercfg /change hibernate-timeout-ac 0
          # RDP on
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # Password daal de same
          $pw = ConvertTo-SecureString "RowdyX@1234" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $pw
          Write-Host "RDP Ready! User: runneradmin Pass: RowdyX@1234"

      - name: 🔁 Bore Auto-Restart + RDP Keepalive + Tunnel Logger
        shell: pwsh
        run: |
          # Bore download ek baar
          $url = "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile bore.zip
          Expand-Archive bore.zip -DestinationPath .\
          
          # Background mein RDP service ko har 120 second pe check karo
          $rdpJob = Start-Job -ScriptBlock {
            while ($true) {
              try {
                $srv = Get-Service TermService -ErrorAction Stop
                if ($srv.Status -ne 'Running') {
                  Start-Service TermService
                }
              } catch { }
              Start-Sleep -Seconds 120
            }
          }

          # Bore ko endless loop mein chalao, agar crash/exit ho to 5 sec mein restart
          Write-Host "🌀 Tunnel loop start, marne nahi denge..."
          while ($true) {
            # Chhotu sa logging setup
            $proc = Start-Process -FilePath ".\bore.exe" -ArgumentList 'local 3389 --to bore.pub' -NoNewWindow -PassThru -RedirectStandardOutput "$env:RUNNER_TEMP/bore_out.log" -RedirectStandardError "$env:RUNNER_TEMP/bore_err.log"
            
            # Log file monitor, jab tak process alive hai
            do {
              # Check logs for "listening at"
              $lastLines = Get-Content "$env:RUNNER_TEMP/bore_out.log" -Tail 20
              foreach ($line in $lastLines) {
                if ($line -match "listening at (\S+:\d+)") {
                  Write-Host "🔥🔥 RDP CONNECT KAR: $($matches[1]) 🔥🔥"
                }
              }
              Start-Sleep -Seconds 10
            } while (-not $proc.HasExited)
            
            # Agar bore mar gaya, to 5 sec mein re-launch
            Write-Host "💤 Bore band, 5 sec mein restart..."
            Start-Sleep -Seconds 5
          }
          # Note: $rdpJob background mein chalta rahega
